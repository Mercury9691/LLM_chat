<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型参数配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .sidebar {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }
        .sidebar.active {
            transform: translateX(0);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <!-- 侧边栏 -->
    <div id="sidebar" class="sidebar fixed left-0 top-0 bottom-0 w-64 bg-gray-800 text-white z-50">
        <div class="p-4 border-b border-gray-700 flex justify-between items-center">
            <h3 class="text-lg font-semibold">菜单</h3>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-times text-xl"></i>
            </button>
        </div>
        <nav class="p-2 space-y-1">
            <a href="/params.html" class="flex items-center gap-3 px-4 py-3 bg-gray-700 rounded-lg transition-colors">
                <i class="fa-solid fa-sliders text-blue-400"></i>
                <span class="font-medium">模型参数</span>
            </a>
            <a href="/" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded-lg transition-colors">
                <i class="fa-solid fa-comments text-gray-400"></i>
                <span class="font-medium">返回聊天</span>
            </a>
        </nav>
        <div class="mt-auto p-4 border-t border-gray-700">
            <p class="text-xs text-gray-400 text-center">© 2026 AI Assistant</p>
        </div>
    </div>

    <!-- 覆盖层 -->
    <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleSidebar()"></div>

    <!-- 主内容区 -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 animate-fade-in">
        <div class="flex items-center gap-3 mb-6">
            <button onclick="toggleSidebar()" class="text-gray-500 hover:text-indigo-600 transition">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <h2 class="text-2xl font-bold text-gray-800">模型参数配置</h2>
        </div>

        <div class="space-y-6">
            <!-- top_k 参数 -->
            <div class="space-y-2">
                <label for="top_k" class="flex items-center gap-2 text-gray-700 font-medium">
                    <i class="fa-solid fa-sliders text-indigo-600"></i>
                    top_k (采样候选词数)
                </label>
                <input type="number" id="top_k" name="top_k" value="20" min="1" max="100" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow">
                <p class="text-sm text-gray-500">
                    值越大生成的选项越多，质量也可能越高；值越小结果越确定性。
                </p>
            </div>

            <!-- 保存按钮 -->
            <button onclick="saveParams()" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-save"></i>
                保存配置
            </button>

            <!-- 返回按钮 -->
            <a href="/" class="w-full py-3 px-4 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium rounded-xl transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-arrow-left"></i>
                返回聊天界面
            </a>
        </div>

        <!-- 状态提示 -->
        <div id="status-message" class="mt-4 py-3 px-4 rounded-lg hidden text-sm font-medium text-center"></div>
    </div>

    <script>
        // 页面加载时获取当前参数值
        async function loadParams() {
            try {
                const res = await fetch('/params');
                const data = await res.json();
                document.getElementById('top_k').value = data.top_k;
            } catch (e) {
                console.error('加载参数失败:', e);
            }
        }

        // 保存参数
        async function saveParams() {
            const top_k = document.getElementById('top_k').value;

            if (!top_k || top_k < 1 || top_k > 100) {
                showStatus('请输入有效的 top_k 值 (1-100)', 'bg-yellow-100 text-yellow-800');
                return;
            }

            try {
                const res = await fetch('/params', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ top_k: parseInt(top_k) })
                });

                if (res.ok) {
                    showStatus('配置已成功保存!', 'bg-green-100 text-green-800');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showStatus('保存失败，请重试', 'bg-red-100 text-red-800');
                }
            } catch (e) {
                showStatus('网络错误: ' + e.message, 'bg-red-100 text-red-800');
            }
        }

        // 显示状态消息
        function showStatus(message, className) {
            const status = document.getElementById('status-message');
            status.textContent = message;
            status.className = 'mt-4 py-3 px-4 rounded-lg text-sm font-medium text-center ' + className;
            status.classList.remove('hidden');

            setTimeout(() => {
                status.classList.add('hidden');
            }, 3000);
        }

        // 侧边栏切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('hidden');
        }

        // 页面加载时获取参数
        loadParams();
    </script>
</body>
</html>
